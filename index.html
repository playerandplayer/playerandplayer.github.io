<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Parliament Simulator</title>

<style>
body { margin:0; font-family:Arial; display:flex; height:100vh; }

#panel {
  width:340px;
  background:#f4f4f4;
  padding:12px;
  overflow:auto;
}

canvas {
  flex:1;
  background:white;
}

.party {
  background:white;
  border:1px solid #ccc;
  padding:6px;
  margin:6px 0;
}

button { margin-top:6px; }

#overview {
  display:none;
  padding:10px;
  background:#fff;
  border:1px solid #ccc;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="panel">

<h2>Parliament</h2>

<label>Total Seats</label>
<input id="total" type="number" value="200">

<button onclick="randomElection()">Generate Election</button>
<button onclick="draw()">Redraw</button>
<button onclick="toggleOverview()">Nation Overview</button>

<div id="overview"></div>

</div>

<canvas id="c" width="1200" height="800"></canvas>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function color(){
  return "#"+Math.floor(Math.random()*16777215).toString(16).padStart(6,"0");
}

/* -----------------------------
   PARTIES (AUTO GENERATED ONLY)
------------------------------*/

let parties = [];

function randomElection(){

  const total = +document.getElementById("total").value;

  const partyCount = 3 + Math.floor(Math.random()*5);

  parties = [];

  let remaining = total;

  for(let i=0;i<partyCount;i++){

    const share = (i === partyCount-1)
      ? remaining
      : Math.max(5, Math.floor(Math.random()*remaining));

    remaining -= share;

    parties.push({
      name:"Party "+String.fromCharCode(65+i),
      seats:share,
      color:color()
    });
  }

  draw();
}

/* -----------------------------
   HE MICYCLE GEOMETRY (FIXED)
------------------------------*/

function generateSeats(total, cx, cy){

  const seats=[];
  const seatR=10;
  const rowGap=28;

  let remaining=total;
  let row=0;

  while(remaining>0){

    const radius=100+row*rowGap;

    const arc=Math.PI*radius;
    let ideal=Math.round(arc/(seatR*2.2));

    let seatsInRow=Math.min(remaining, Math.max(6, ideal));

    for(let i=0;i<seatsInRow;i++){

      const t = seatsInRow===1 ? 0.5 : i/(seatsInRow-1);
      const angle = Math.PI - t*Math.PI;

      seats.push({
        x:cx+radius*Math.cos(angle),
        y:cy-radius*Math.sin(angle),
        angle
      });
    }

    remaining-=seatsInRow;
    row++;
  }

  return seats;
}

/* -----------------------------
   DRAW PARLIAMENT
------------------------------*/

function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const total=+document.getElementById("total").value;

  const cx=canvas.width/2;
  const cy=canvas.height-60;

  let seats=generateSeats(total,cx,cy);

  // left → right ordering
  seats.sort((a,b)=>b.angle-a.angle);

  let colors=[];

  for(const p of parties){
    for(let i=0;i<p.seats;i++) colors.push(p.color);
  }

  while(colors.length<seats.length)
    colors.push("#ddd");

  for(let i=0;i<seats.length;i++){

    ctx.beginPath();
    ctx.arc(seats[i].x,seats[i].y,9,0,Math.PI*2);
    ctx.fillStyle=colors[i];
    ctx.fill();
    ctx.stroke();
  }

  drawOverview();
}

/* -----------------------------
   NATION OVERVIEW
------------------------------*/

function drawOverview(){

  const totalSeats = parties.reduce((a,b)=>a+b.seats,0);

  const majority = Math.floor(totalSeats/2)+1;

  const shares = parties.map(p=>p.seats/totalSeats);

  const effectiveENP = 1 / shares.reduce((a,b)=>a + b*b, 0);

  const largest = Math.max(...shares);

  const ov = document.getElementById("overview");

  ov.innerHTML = `
    <b>Nation Overview</b><br><br>

    Total seats: ${totalSeats}<br>
    Parties: ${parties.length}<br>
    Majority: ${majority}<br><br>

    Largest party: ${(largest*100).toFixed(1)}%<br>
    Effective number of parties: ${effectiveENP.toFixed(2)}<br>
  `;
}

/* -----------------------------
   TOGGLE PANEL
------------------------------*/

function toggleOverview(){
  const o=document.getElementById("overview");
  o.style.display = o.style.display==="none" ? "block" : "none";
}

randomElection();

</script>
</body>
</html>
