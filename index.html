<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Parliament Diagram (Hemicycle)</title>
<style>
body { margin:0; font-family:Arial; display:flex; height:100vh; }
#panel { width:320px; background:#f4f4f4; padding:12px; overflow:auto; }
canvas { flex:1; background:white; }
.party { border:1px solid #ccc; padding:6px; margin:6px 0; background:#fff; }
input { width:95%; margin:2px 0; }
button { margin-top:6px; }
h2 { margin:6px 0 10px; }
</style>
</head>
<body>

<div id="panel">
<h2>Parliament</h2>

<label>Total seats</label>
<input id="total" type="number" value="200">

<div id="parties"></div>

<button onclick="addParty()">Add Party</button>
<button onclick="draw()">Draw</button>
</div>

<canvas id="c" width="1200" height="800"></canvas>

<script>

const partiesDiv = document.getElementById("parties");

function randColor(){
  return "#"+Math.floor(Math.random()*16777215).toString(16).padStart(6,"0");
}

function addParty(name="Party", seats=20, color=randColor()){
  const d = document.createElement("div");
  d.className="party";
  d.innerHTML = `
    Name<input class="n" value="${name}">
    Seats<input class="s" type="number" value="${seats}">
    Color<input class="c" type="color" value="${color}">
    <button onclick="this.parentNode.remove();draw()">Remove</button>
  `;
  d.querySelectorAll("input").forEach(i=>i.oninput=draw);
  partiesDiv.appendChild(d);
  draw();
}

addParty("Left", 80, "#d73027");
addParty("Center", 60, "#fee08b");
addParty("Right", 60, "#4575b4");

function getParties(){
  return [...document.querySelectorAll(".party")].map(p=>({
    name:p.querySelector(".n").value,
    seats:+p.querySelector(".s").value,
    color:p.querySelector(".c").value
  }));
}

/*
CORE FIX:
- true hemicycle rows
- consistent center origin
- no spiral / radial distortion
- seats filled row-by-row in a proper arc grid
*/
function generateHemicycle(total, cx, cy){
  const seats = [];

  const seatR = 10;
  const rowGap = 28;

  let placed = 0;
  let row = 0;

  while(placed < total){

    const radius = 100 + row * rowGap;

    // angular width of a hemicycle (180°)
    const arcStart = Math.PI;
    const arcEnd = 0;

    const circumference = Math.PI * radius;

    const seatsInRow = Math.max(6, Math.floor(circumference / (seatR * 2.3)));

    for(let i=0; i<seatsInRow && placed<total; i++){

      const t = i / (seatsInRow - 1 || 1);
      const angle = arcStart + (arcEnd - arcStart) * t;

      seats.push({
        x: cx + radius * Math.cos(angle),
        y: cy - radius * Math.sin(angle)
      });

      placed++;
    }

    row++;
  }

  return seats;
}

function draw(){

  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const parties = getParties();
  const total = +document.getElementById("total").value;

  const cx = canvas.width/2;
  const cy = canvas.height - 60;

  const seats = generateHemicycle(total, cx, cy);

  // flatten party blocks (true parliament logic)
  const assignment = [];
  parties.forEach(p=>{
    for(let i=0;i<p.seats;i++) assignment.push(p.color);
  });

  while(assignment.length < seats.length)
    assignment.push("#ddd");

  // draw seats
  for(let i=0;i<seats.length;i++){
    const s = seats[i];

    ctx.beginPath();
    ctx.arc(s.x, s.y, 9, 0, Math.PI*2);
    ctx.fillStyle = assignment[i];
    ctx.fill();
    ctx.strokeStyle = "#222";
    ctx.stroke();
  }

  // legend
  let y=20;
  ctx.font="14px Arial";

  parties.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.fillRect(20,y-12,14,14);
    ctx.fillStyle="#000";
    ctx.fillText(`${p.name} (${p.seats})`,45,y);
    y+=22;
  });
}

draw();

</script>
</body>
</html>
