<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Parliament Diagram Maker</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f2f2f2;
}

.container{
    display:flex;
    height:100vh;
}

.sidebar{
    width:320px;
    background:white;
    padding:20px;
    overflow:auto;
    box-shadow:2px 0 10px rgba(0,0,0,.15);
}

canvas{
    flex:1;
    background:white;
}

h2{
    margin-top:0;
}

.party{
    border:1px solid #ccc;
    padding:8px;
    margin-bottom:10px;
    border-radius:6px;
}

.party input{
    width:90%;
    margin:3px 0;
}

button{
    margin-top:8px;
    padding:8px 12px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<div class="sidebar">

<h2>Parliament Diagram</h2>

<label>Total Seats</label><br>
<input id="totalSeats" type="number" value="100"><br><br>

<div id="parties"></div>

<button onclick="addParty()">Add Party</button>
<button onclick="draw()">Draw</button>
<button onclick="download()">Export PNG</button>

</div>

<canvas id="canvas" width="1000" height="700"></canvas>

</div>

<script>

const partiesDiv=document.getElementById("parties");

function addParty(name="",seats=0,color=randomColor()){

    const div=document.createElement("div");
    div.className="party";

    div.innerHTML=`
    <label>Name</label><br>
    <input class="name" value="${name}"><br>

    <label>Seats</label><br>
    <input class="seats" type="number" value="${seats}"><br>

    <label>Color</label><br>
    <input class="color" type="color" value="${color}"><br>

    <button onclick="this.parentNode.remove();draw();">Remove</button>
    `;

    div.querySelectorAll("input").forEach(i=>{
        i.addEventListener("input",draw);
    });

    partiesDiv.appendChild(div);
}

function randomColor(){
    return "#"+Math.floor(Math.random()*16777215)
        .toString(16)
        .padStart(6,"0");
}

addParty("Party A",40,"#d73027");
addParty("Party B",30,"#4575b4");
addParty("Party C",20,"#66bd63");
addParty("Party D",10,"#fdae61");

function draw(){

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

ctx.clearRect(0,0,canvas.width,canvas.height);

const total=parseInt(document.getElementById("totalSeats").value);

let partyData=[];

document.querySelectorAll(".party").forEach(p=>{

partyData.push({
name:p.querySelector(".name").value,
seats:parseInt(p.querySelector(".seats").value)||0,
color:p.querySelector(".color").value
});

});

let colors=[];

partyData.forEach(p=>{
    for(let i=0;i<p.seats;i++)
        colors.push(p.color);
});

while(colors.length<total)
    colors.push("#cccccc");

colors=colors.slice(0,total);

const cx=canvas.width/2;
const cy=canvas.height-60;

const seatRadius=10;

const rows=Math.ceil(Math.sqrt(total)/2)+3;

let placed=0;

for(let row=0;row<rows;row++){

    const r=70+row*35;

    const seats=Math.max(
        5,
        Math.floor(Math.PI*r/(seatRadius*2.2))
    );

    for(let i=0;i<seats;i++){

        if(placed>=colors.length)
            break;

        const angle=Math.PI-(i/(seats-1))*Math.PI;

        const x=cx+r*Math.cos(angle);
        const y=cy-r*Math.sin(angle);

        ctx.beginPath();
        ctx.arc(x,y,seatRadius,0,Math.PI*2);
        ctx.fillStyle=colors[placed];
        ctx.fill();
        ctx.strokeStyle="#222";
        ctx.stroke();

        placed++;

    }

}

ctx.font="16px Arial";
ctx.fillStyle="black";

let y=30;

partyData.forEach(p=>{

ctx.fillStyle=p.color;
ctx.fillRect(20,y-12,20,20);

ctx.fillStyle="black";
ctx.fillText(`${p.name} (${p.seats})`,50,y+3);

y+=28;

});

}

draw();

function download(){

const a=document.createElement("a");
a.download="parliament.png";
a.href=document.getElementById("canvas").toDataURL();
a.click();

}

</script>

</body>
</html>
